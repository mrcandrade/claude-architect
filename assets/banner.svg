<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="300" rx="16" fill="url(#bg)" />
  
  <!-- Decorative grid dots -->
  <g fill="#334155" opacity="0.4">
    <circle cx="50" cy="50" r="1.5" />
    <circle cx="90" cy="50" r="1.5" />
    <circle cx="130" cy="50" r="1.5" />
    <circle cx="50" cy="90" r="1.5" />
    <circle cx="90" cy="90" r="1.5" />
    <circle cx="130" cy="90" r="1.5" />
    <circle cx="770" cy="210" r="1.5" />
    <circle cx="810" cy="210" r="1.5" />
    <circle cx="850" cy="210" r="1.5" />
    <circle cx="770" cy="250" r="1.5" />
    <circle cx="810" cy="250" r="1.5" />
    <circle cx="850" cy="250" r="1.5" />
  </g>

  <!-- Claude sparkle icon -->
  <g transform="translate(150,150)" fill="url(#accent)">
    <ellipse rx="8" ry="38" />
    <ellipse rx="8" ry="38" transform="rotate(45)" />
    <ellipse rx="8" ry="38" transform="rotate(90)" />
    <ellipse rx="8" ry="38" transform="rotate(135)" />
    <circle r="14" />
  </g>

  <!-- Title text -->
  <text x="240" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="bold" fill="#F8FAFC">Claude Architect</text>
  
  <!-- Subtitle -->
  <text x="240" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#94A3B8">Guia completo para dominar a API da Anthropic</text>
  
  <!-- Accent line -->
  <rect x="240" y="195" width="120" height="3" rx="1.5" fill="url(#accent)" />
  
  <!-- Tags -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="13">
    <rect x="240" y="215" width="80" height="26" rx="13" fill="#1E3A5F" />
    <text x="256" y="233" fill="#60A5FA">Prompts</text>
    
    <rect x="330" y="215" width="60" height="26" rx="13" fill="#1E3A5F" />
    <text x="342" y="233" fill="#60A5FA">Tools</text>
    
    <rect x="400" y="215" width="80" height="26" rx="13" fill="#1E3A5F" />
    <text x="416" y="233" fill="#60A5FA">Agentes</text>
    
    <rect x="490" y="215" width="60" height="26" rx="13" fill="#1E3A5F" />
    <text x="505" y="233" fill="#60A5FA">RAG</text>
    
    <rect x="560" y="215" width="60" height="26" rx="13" fill="#1E3A5F" />
    <text x="574" y="233" fill="#60A5FA">MCP</text>
    
    <rect x="630" y="215" width="64" height="26" rx="13" fill="#1E3A5F" />
    <text x="644" y="233" fill="#60A5FA">Evals</text>
  </g>

  <!-- Terminal icon (small) bottom-right -->
  <g transform="translate(800,60)">
    <rect x="0" y="0" width="60" height="45" rx="8" fill="#334155" />
    <circle cx="10" cy="10" r="3" fill="#EF4444" />
    <circle cx="20" cy="10" r="3" fill="#EAB308" />
    <circle cx="30" cy="10" r="3" fill="#22C55E" />
    <text x="8" y="34" font-family="monospace" font-size="14" fill="#D97706">&gt;_</text>
  </g>
</svg>
