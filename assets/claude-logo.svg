<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#grad)" />
  <g transform="translate(60,60)" fill="#fff">
    <!-- Starburst / sparkle shape inspired by Claude's aesthetic -->
    <ellipse rx="6" ry="28" />
    <ellipse rx="6" ry="28" transform="rotate(45)" />
    <ellipse rx="6" ry="28" transform="rotate(90)" />
    <ellipse rx="6" ry="28" transform="rotate(135)" />
    <circle r="10" />
  </g>
</svg>
